<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>الجلاّد - Al-Jallad</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: #000000; color: #D4AF37; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { padding: 20px; text-align: center; border-bottom: 2px solid #D4AF37; font-size: 26px; font-weight: bold; background: #000; flex-shrink: 0; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; background-color: #000; -webkit-overflow-scrolling: touch; }
        .message { margin-bottom: 20px; padding: 14px 20px; border-radius: 18px; max-width: 85%; font-size: 18px; line-height: 1.5; word-wrap: break-word; }
        .user-message { align-self: flex-start; background-color: #222; color: #FFF; border-bottom-right-radius: 4px; }
        .bot-message { align-self: flex-end; background-color: #D4AF37; color: #000; border-bottom-left-radius: 4px; font-weight: bold; }
        #typing-indicator { align-self: flex-end; color: #D4AF37; font-size: 14px; font-style: italic; margin-bottom: 15px; display: none; }
        #input-area { padding: 15px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); background-color: #000; border-top: 1px solid #D4AF37; display: flex; gap: 10px; flex-shrink: 0; }
        #user-input { flex: 1; background-color: #1a1a1a; border: 1px solid #D4AF37; border-radius: 25px; padding: 12px 20px; color: #D4AF37; font-size: 18px; outline: none; }
        #send-btn { background-color: #D4AF37; color: #000; border: none; border-radius: 25px; padding: 0 25px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="header">الجلاّد</div>
    <div id="chat-container"><div class="message bot-message">ارحب.. عطنا ما عندك.</div></div>
    <div id="typing-indicator">الجلاّد يجهز الرد...</div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="اكتب كلامك هنا..." autocomplete="off">
        <button id="send-btn">أرسل</button>
    </div>
    <script type="text/javascript">
        (function() {
            var chat = document.getElementById('chat-container');
            var input = document.getElementById('user-input');
            var btn = document.getElementById('send-btn');
            var typing = document.getElementById('typing-indicator');

            function addMsg(text, isUser) {
                var d = document.createElement('div');
                d.className = 'message ' + (isUser ? 'user-message' : 'bot-message');
                d.innerText = text;
                chat.appendChild(d);
                chat.scrollTop = chat.scrollHeight;
            }

            function send() {
                var text = input.value.trim();
                if (!text) return;
                addMsg(text, true);
                input.value = '';
                typing.style.display = 'block';
                chat.scrollTop = chat.scrollHeight;

                var xhr = new XMLHttpRequest();
                xhr.open('GET', '/api/roast?prompt=' + encodeURIComponent(text), true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        typing.style.display = 'none';
                        if (xhr.status === 200) {
                            addMsg(xhr.responseText || "ما لقيت رد يناسب وجهك.", false);
                        } else {
                            addMsg("النت عندك تعبان مثلك.. جرب ثانية.", false);
                        }
                    }
                };
                xhr.send();
            }

            btn.onclick = send;
            input.onkeydown = function(e) { if ((e.which || e.keyCode) === 13) { send(); input.blur(); } };
        })();
    </script>
</body>
</html>
