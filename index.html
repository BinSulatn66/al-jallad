<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>الجلاّد - Al-Jallad</title>
    <style>
        /* Royal Saudi Aesthetic: Gold on Black */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        html, body {
            background-color: #000000;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed; /* Prevents bounce on iOS */
        }
        body {
            color: #D4AF37;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }
        #header {
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #D4AF37;
            font-size: 24px;
            font-weight: bold;
            background: #000;
            flex-shrink: 0;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            background-color: #000;
            -webkit-overflow-scrolling: touch;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 85%;
            font-size: 17px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user-message {
            align-self: flex-start;
            background-color: #222;
            color: #FFF;
            border-bottom-right-radius: 4px;
            border: 1px solid #333;
        }
        .bot-message {
            align-self: flex-end;
            background-color: #D4AF37;
            color: #000;
            border-bottom-left-radius: 4px;
            font-weight: bold;
        }
        #typing-indicator {
            align-self: flex-end;
            color: #D4AF37;
            font-size: 13px;
            font-style: italic;
            margin: 0 0 10px 0;
            display: none;
            padding: 0 5px;
        }
        #input-form {
            padding: 12px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            background-color: #000;
            border-top: 1px solid #D4AF37;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        #user-input {
            flex: 1;
            background-color: #1a1a1a;
            border: 1px solid #D4AF37;
            border-radius: 25px;
            padding: 10px 18px;
            color: #D4AF37;
            font-size: 16px;
            outline: none;
            -webkit-appearance: none;
        }
        #send-btn {
            background-color: #D4AF37;
            color: #000;
            border: none;
            border-radius: 25px;
            padding: 0 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            -webkit-appearance: none;
        }
        #send-btn:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="header">الجلاّد</div>
    <div id="chat-container">
        <div class="message bot-message">اررحب.. اخلص وش عندك؟</div>
    </div>
    <div id="typing-indicator">الجلاّد يجهز القصف...</div>
    <form id="input-form" action="#">
        <input type="text" id="user-input" placeholder="اكتب ردك هنا..." autocomplete="off" inputmode="text">
        <button type="submit" id="send-btn">أرسل</button>
    </form>

    <script type="text/javascript">
        (function() {
            var chat = document.getElementById('chat-container');
            var input = document.getElementById('user-input');
            var form = document.getElementById('input-form');
            var typing = document.getElementById('typing-indicator');
            var isWaiting = false;

            function addMsg(text, isUser) {
                var d = document.createElement('div');
                d.className = 'message ' + (isUser ? 'user-message' : 'bot-message');
                d.innerText = text;
                chat.appendChild(d);
                chat.scrollTop = chat.scrollHeight;
                setTimeout(function() { chat.scrollTop = chat.scrollHeight; }, 100);
            }

            function handleAction(e) {
                if (e && e.preventDefault) {
                    e.preventDefault();
                } else if (window.event) {
                    window.event.returnValue = false;
                }

                if (isWaiting) return false;

                var raw = input.value;
                if (!raw) return false;
                
                var text = raw.replace(/^\s+|\s+$/g, '');
                if (text === "") return false;

                isWaiting = true;
                addMsg(text, true);
                input.value = '';
                typing.style.display = 'block';
                chat.scrollTop = chat.scrollHeight;

                var xhr = new XMLHttpRequest();
                var url = '/api/roast?prompt=' + encodeURIComponent(text);
                
                xhr.open('GET', url, true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        isWaiting = false;
                        typing.style.display = 'none';
                        if (xhr.status === 200) {
                            addMsg(xhr.responseText || "ما لقيت رد يناسب وجهك.", false);
                        } else {
                            addMsg("حتى النت عندك طفش من وجهك.. جرب ثانية.", false);
                        }
                    }
                };
                xhr.send();
                return false;
            }

            if (form.addEventListener) {
                form.addEventListener('submit', handleAction, false);
            } else if (form.attachEvent) {
                form.attachEvent('onsubmit', handleAction);
            } else {
                form.onsubmit = handleAction;
            }

            input.onfocus = function() {
                setTimeout(function() { chat.scrollTop = chat.scrollHeight; }, 300);
            };
        })();
    </script>
</body>
</html>
