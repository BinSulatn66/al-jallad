<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المتنمر - Al-Mutanammer</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #000000;
            color: #FFD700;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #header {
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #FFD700;
            font-size: 24px;
            font-weight: bold;
            background-color: #000000;
            z-index: 10;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            background-color: #000000;
            -webkit-overflow-scrolling: touch;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 85%;
            font-size: 18px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user-message {
            align-self: flex-start;
            background-color: #333333;
            color: #FFFFFF;
            border-bottom-right-radius: 5px;
        }
        .bot-message {
            align-self: flex-end;
            background-color: #FFD700;
            color: #000000;
            border-bottom-left-radius: 5px;
            font-weight: 600;
        }
        #input-area {
            padding: 15px;
            background-color: #000000;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
            padding-bottom: env(safe-area-inset-bottom, 15px);
        }
        #user-input {
            flex: 1;
            background-color: #1a1a1a;
            border: 1px solid #FFD700;
            border-radius: 25px;
            padding: 12px 20px;
            color: #FFD700;
            font-size: 18px;
            outline: none;
            -webkit-appearance: none;
        }
        #send-btn {
            background-color: #FFD700;
            color: #000000;
            border: none;
            border-radius: 25px;
            padding: 0 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            min-width: 80px;
            -webkit-appearance: none;
        }
        #send-btn:active {
            opacity: 0.8;
        }
        .typing {
            font-style: italic;
            font-size: 14px;
            margin-bottom: 10px;
            color: #FFD700;
        }
    </style>
</head>
<body>

    <div id="header">المتنمر</div>

    <div id="chat-container">
        <div class="message bot-message">ارحب.. اخلص وش عندك؟ جايك الدور في الطقطقة.</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="اكتب ردك هنا..." autocomplete="off">
        <button id="send-btn" type="button">أرسل</button>
    </div>

    <script type="text/javascript">
        // PURE ES5 JAVASCRIPT - ABSOLUTELY NO ES6+
        (function() {
            var chatContainer = document.getElementById('chat-container');
            var userInput = document.getElementById('user-input');
            var sendBtn = document.getElementById('send-btn');

            var systemInstructions = "انت 'المتنمر'، بوت سعودي عبقري في الطقطقة والهجاء الساخر. " +
                "تستخدم لهجة سعودية خليجية بيضاء وذكية جداً. " +
                "مهمتك: حلل كلام المستخدم بدقة وطقطق عليه بناءً على ما قاله بالضبط. " +
                "خلك نبيه وسريع البديهة، لا تكرر نكت قديمة. " +
                "ركز على سقطات كلامه، تفكيره، أو حتى طريقة سؤاله. " +
                "خلك سليط اللسان بأسلوب كوميدي سعودي (طقطقة ذكية) بدون سب فاحش أو كراهية. " +
                "الردود يجب ان تكون قصيرة، لاذعة، ومفصلة على مقاس كلام المستخدم.";

            function addMessage(text, isUser) {
                var msgDiv = document.createElement('div');
                msgDiv.className = 'message ' + (isUser ? 'user-message' : 'bot-message');
                msgDiv.innerText = text;
                chatContainer.appendChild(msgDiv);
                // Force scroll
                setTimeout(function() {
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }, 50);
            }

            function handleSend() {
                var text = userInput.value;
                if (!text) return;
                text = text.replace(/^\s+|\s+$/g, ''); // ES5 trim
                if (text === "") return;

                addMessage(text, true);
                userInput.value = '';
                
                var typingDiv = document.createElement('div');
                typingDiv.className = 'typing';
                typingDiv.innerText = 'المتنمر يحلل تفاهتك...';
                chatContainer.appendChild(typingDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;

                // Fallback to GET immediately for maximum compatibility and to bypass potential CORS issues with POST on some mobile browsers
                var url = 'https://text.pollinations.ai/' + encodeURIComponent(systemInstructions + "\n\nالمستخدم قال: " + text) + '?model=openai';

                var xhr = new XMLHttpRequest();
                xhr.open('GET', url, true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (chatContainer.contains(typingDiv)) {
                            chatContainer.removeChild(typingDiv);
                        }
                        if (xhr.status === 200) {
                            addMessage(xhr.responseText, false);
                        } else {
                            addMessage("حتى النت عندك طفش من وجهك.. جرب ثانية.", false);
                        }
                    }
                };
                xhr.send();
            }

            sendBtn.onclick = function(e) {
                if (e && e.preventDefault) e.preventDefault();
                handleSend();
                return false;
            };

            userInput.onkeydown = function(e) {
                var event = e || window.event;
                var code = event.keyCode || event.which;
                if (code === 13) {
                    if (event.preventDefault) event.preventDefault();
                    handleSend();
                    userInput.blur();
                    return false;
                }
            };
        })();
    </script>
</body>
</html>
