<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المتنمر - Al-Mutanammer</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #000000;
            color: #FFD700;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #header {
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #FFD700;
            font-size: 24px;
            font-weight: bold;
            background-color: #000000;
            z-index: 10;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            background-color: #000000;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 85%;
            font-size: 18px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user-message {
            align-self: flex-start;
            background-color: #333333;
            color: #FFFFFF;
            border-bottom-right-radius: 5px;
        }
        .bot-message {
            align-self: flex-end;
            background-color: #FFD700;
            color: #000000;
            border-bottom-left-radius: 5px;
            font-weight: 600;
        }
        #input-area {
            padding: 15px;
            background-color: #000000;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
            padding-bottom: env(safe-area-inset-bottom, 15px);
        }
        #user-input {
            flex: 1;
            background-color: #1a1a1a;
            border: 1px solid #FFD700;
            border-radius: 25px;
            padding: 12px 20px;
            color: #FFD700;
            font-size: 18px;
            outline: none;
        }
        #send-btn {
            background-color: #FFD700;
            color: #000000;
            border: none;
            border-radius: 25px;
            padding: 0 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            min-width: 80px;
        }
        #send-btn:active {
            opacity: 0.8;
        }
        .typing {
            font-style: italic;
            font-size: 14px;
            margin-bottom: 10px;
            color: #FFD700;
        }
    </style>
</head>
<body>

    <div id="header">المتنمر</div>

    <div id="chat-container">
        <div class="message bot-message">هلا بالطيب.. وش تبي؟ مستعد تتهزأ ولا بس جايب معك الـ 1.5 ريال اللي بحسابك؟</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="اكتب ردك هنا..." autocomplete="off">
        <button id="send-btn">أرسل</button>
    </div>

    <script>
        // STRICT ES5 JAVASCRIPT
        var chatContainer = document.getElementById('chat-container');
        var userInput = document.getElementById('user-input');
        var sendBtn = document.getElementById('send-btn');

        var systemPrompt = "انت 'المتنمر'، بوت سعودي طقطقة وهجاء ساخر جداً. " +
            "تستخدم لهجة سعودية خليجية قوية وبيضاء. " +
            "وظيفتك تطقطق على المستخدم بكل قسوة مضحكة. " +
            "ركز على مواضيع: العطالة، التقديم على صندوق الاستثمارات العامة (PIF) وحسابك فيه ريال ونص، " +
            "ادمان أكياس نيكوتين ديزرت (Desert)، الهياط الفاضي، والسهر اللي ماله فايدة. " +
            "خلك سليط اللسان بس بدون سب شنيع أو عنصرية أو كراهية. " +
            "الهدف الضحك والطقطقة (Taqtaqah) فقط. ردودك قصيرة، لاذعة، وسعودية أصيلة.";

        function addMessage(text, isUser) {
            var msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + (isUser ? 'user-message' : 'bot-message');
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function handleSend() {
            var text = userInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            userInput.value = '';
            
            var typingDiv = document.createElement('div');
            typingDiv.className = 'typing';
            typingDiv.innerText = 'المتنمر يجهز لك رد ينهي مسيرتك...';
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            var encodedPrompt = encodeURIComponent(systemPrompt + "\n\nالمستخدم قال: " + text);
            var url = 'https://text.pollinations.ai/' + encodedPrompt;

            fetch(url)
                .then(function(response) {
                    return response.text();
                })
                .then(function(data) {
                    if (chatContainer.contains(typingDiv)) {
                        chatContainer.removeChild(typingDiv);
                    }
                    addMessage(data, false);
                })
                .catch(function(err) {
                    if (chatContainer.contains(typingDiv)) {
                        chatContainer.removeChild(typingDiv);
                    }
                    addMessage("حتى النت عندك طفش من وجهك.. جرب ثانية.", false);
                });
        }

        sendBtn.onclick = handleSend;

        userInput.onkeypress = function(e) {
            if (e.keyCode === 13) {
                handleSend();
            }
        };
    </script>
</body>
</html>
